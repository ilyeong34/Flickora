<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        html, body, #player {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: #000;
        }
    </style>
</head>
<body>
<div id="player"></div>
<script src="https://www.youtube.com/iframe_api"></script>
<script>
    var player = null;
    var progressTimer = null;
    var pauseAfterFirstPlay = false;
    var queryParams = new URLSearchParams(window.location.search);
    var initialVideoId = queryParams.get('videoId') || null;
    var initialStartSeconds = Number(queryParams.get('startSeconds') || 0);
    var initialMode = queryParams.get('initialMode') || 'cue';

    function notifyAndroid(method, value) {
        if (window.AndroidPlayer && window.AndroidPlayer[method]) {
            window.AndroidPlayer[method](value);
        }
    }

    function onYouTubeIframeAPIReady() {
        pauseAfterFirstPlay = initialMode === 'restore_paused';

        var playerVars = {
            autoplay: initialMode === 'autoplay' || initialMode === 'restore_paused' ? 1 : 0,
            controls: 1,
            enablejsapi: 1,
            fs: 1,
            modestbranding: 1,
            origin: 'https://www.youtube.com',
            playsinline: 1,
            rel: 0,
            start: Math.max(0, Math.floor(initialStartSeconds || 0))
        };

        var options = {
            width: '100%',
            height: '100%',
            playerVars: playerVars,
            events: {
                onReady: onPlayerReady,
                onStateChange: onPlayerStateChange,
                onError: onPlayerError
            }
        };

        if (initialVideoId) {
            options.videoId = initialVideoId;
        }

        player = new YT.Player('player', options);
    }

    function onPlayerReady() {
        startProgressTimer();
    }

    function onPlayerStateChange(event) {
        notifyAndroid('onStateChange', event.data);
        sendProgress();

        if (event.data === YT.PlayerState.PLAYING && pauseAfterFirstPlay) {
            pauseAfterFirstPlay = false;
            setTimeout(function () {
                if (player) {
                    player.pauseVideo();
                }
            }, 0);
        }
    }

    function onPlayerError(event) {
        notifyAndroid('onError', event.data);
    }

    function startProgressTimer() {
        if (progressTimer !== null) {
            clearInterval(progressTimer);
        }
        progressTimer = setInterval(sendProgress, 500);
    }

function sendProgress() {
        if (!player || typeof player.getCurrentTime !== 'function') {
            return;
        }
        notifyAndroid('onCurrentSecond', player.getCurrentTime());
    }

</script>
</body>
</html>
